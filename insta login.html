<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 350px;
    }

    .login-box {
      background: #fff;
      border: 1px solid #dbdbdb;
      padding: 40px;
      text-align: center;
    }

    .logo {
      font-size: 38px;
      font-family: cursive;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #dbdbdb;
      border-radius: 4px;
      background: #fafafa;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #0095f6;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #007adf;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
    }

    .divider div {
      flex: 1;
      height: 1px;
      background: #dbdbdb;
    }

    .divider span {
      margin: 0 10px;
      font-size: 12px;
      color: #8e8e8e;
    }

    .fb-login {
      color: #385185;
      font-weight: bold;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .forgot {
      font-size: 12px;
      color: #00376b;
      text-decoration: none;
    }

    .signup-box {
      margin-top: 10px;
      background: #fff;
      border: 1px solid #dbdbdb;
      padding: 20px;
      text-align: center;
    }

    .signup-box a {
      color: #0095f6;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="login-box">
    <div class="logo">Instagram</div>

    <form>
      <input type="text" placeholder="Phone number, username, or email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>

    <div class="divider">
      <div></div>
      <span>OR</span>
      <div></div>
    </div>

    <div class="fb-login">Log in with Facebook</div>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <div class="signup-box">
    Don't have an account? <a href="#">Sign up</a>
  </div>
</div>

</body>
</html>
